<!DOCTYPE html>
<html>
<head>
    <title>Crop Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 🌾 Background Image + Overlay */
        .bg-wrapper {
            position: fixed;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(20, 80, 40, 0.6), rgba(20, 80, 40, 0.6)),
                url('https://images.unsplash.com/photo-1500382017468-9049fed747ef');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            margin-top: 40px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease;
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .title {
            color: #2e7d32;
            font-weight: bold;
        }

        img {
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="bg-wrapper"></div>

<div class="container">
    <div class="container-box">

        <h2 class="text-center mb-4 title">🌿 Crop Analysis Result</h2>

        <!-- IMAGE -->
        <div class="text-center mb-4">
            <img id="previewImage" style="max-height:280px;">
        </div>

        <!-- TOP CARDS -->
        <div class="row text-center">

            <div class="col-md-4 mb-3">
                <div class="card p-3 shadow">
                    <h5>🌱 Disease</h5>
                    <p id="disease"></p>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card p-3 shadow">
                    <h5>🌡 Temperature</h5>
                    <p id="temp"></p>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card p-3 shadow">
                    <h5>💧 Humidity</h5>
                    <p id="humidity"></p>
                </div>
            </div>

        </div>

        <!-- RISK -->
        <div class="card p-3 shadow mb-3">
            <h5>⚠ Risk</h5>
            <p id="risk"></p>
        </div>

        <!-- RECOMMENDATION -->
        <div class="card p-3 shadow mb-3">
            <h5>💊 Recommendation</h5>
            <p id="recommendation"></p>
        </div>

        <!-- TIMELINE -->
        <div class="card p-3 shadow">
            <h5>📅 Action Plan</h5>
            <ul id="timeline"></ul>
        </div>

    </div>
</div>

<script>
function loadDashboard() {
    const data = JSON.parse(localStorage.getItem("cropResult"));
    const image = localStorage.getItem("cropImage");

    if (!data) {
        alert("No data found. Please upload again.");
        window.location.href = "upload.html";
        return;
    }

    // ✅ IMAGE DISPLAY
    if (image && image.startsWith("data:image")) {
        document.getElementById("previewImage").src = image;
    }

    // TEXT DATA
    document.getElementById("disease").innerText = data.disease;
    document.getElementById("temp").innerText = data.temperature + " °C";
    document.getElementById("humidity").innerText = data.humidity + " %";
    document.getElementById("risk").innerText = data.risk;
    document.getElementById("recommendation").innerText = data.recommendation;

    // TIMELINE
    let html = "";
    data.timeline.forEach(item => {
        html += `<li>${item}</li>`;
    });

    document.getElementById("timeline").innerHTML = html;
}

window.onload = loadDashboard;
</script>

</body>
</html>
